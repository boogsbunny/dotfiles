[general]
live_config_reload = true
import = [
    "~/.config/alacritty/current-theme.toml"
]

[env]
TERM = "xterm-256color"

[font]
size = 30

[font.normal]
family = "Iosevka Term Nerd Font Mono"

[font.glyph_offset]
x = 0
y = 0

[font.offset]
x = 0
y = 3

[scrolling]
history = 100000

[window]
decorations = "buttonless"
dynamic_padding = false
dynamic_title = true
opacity = 1

[window.padding]
x = 5
y = 5
